name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests without native extension
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib-hexafe-plotstats
        run: python -m pytest -q
      - name: Compile Python files
        run: python -m compileall -q src tests scripts examples

  native:
    name: Native Rust renderer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install "maturin>=1.12,<2"
      - name: Check Rust formatting
        if: runner.os == 'Linux'
        working-directory: native/hexafe-plotstats-native
        run: cargo fmt --check
      - name: Check Rust crate
        working-directory: native/hexafe-plotstats-native
        run: cargo check --locked
      - name: Test Rust crate
        working-directory: native/hexafe-plotstats-native
        run: cargo test --locked
      - name: Build native wheel
        working-directory: native/hexafe-plotstats-native
        run: python -m maturin build --release --locked --out dist
      - name: Install native wheel
        shell: bash
        run: python -m pip install native/hexafe-plotstats-native/dist/*.whl
      - name: Run tests with native extension
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib-hexafe-plotstats
        run: python -m pytest tests/test_native_renderer_smoke.py tests/test_renderer_backends.py -q
      - name: Run native tests with resvg text fallback
        env:
          HEXAFE_PLOTSTATS_NATIVE_TEXT: resvg
          MPLBACKEND: Agg
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib-hexafe-plotstats
        run: python -m pytest tests/test_native_renderer_smoke.py -q
      - name: Benchmark smoke
        if: runner.os == 'Linux'
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib-hexafe-plotstats
        run: python scripts/benchmark_renderers.py --chart synthetic --repeats 1 --warmups 0 --json
