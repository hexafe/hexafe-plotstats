name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests without native extension
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib-hexafe-plotstats
        run: python -m pytest -q
      - name: Compile Python files
        run: python -m compileall -q src tests scripts examples

  native:
    name: Native Rust renderer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install "maturin>=1.12,<2"
      - name: Check Rust formatting
        working-directory: native/hexafe-plotstats-native
        run: cargo fmt --check
      - name: Check Rust crate
        working-directory: native/hexafe-plotstats-native
        run: cargo check
      - name: Test Rust crate
        working-directory: native/hexafe-plotstats-native
        run: cargo test
      - name: Build native wheel
        working-directory: native/hexafe-plotstats-native
        run: python -m maturin build --quiet
      - name: Install native wheel
        run: python -m pip install native/hexafe-plotstats-native/target/wheels/*.whl
      - name: Run tests with native extension
        env:
          MPLBACKEND: Agg
          MPLCONFIGDIR: /tmp/matplotlib-hexafe-plotstats
        run: python -m pytest -q
